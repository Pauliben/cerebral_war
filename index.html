<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Tug of War</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="timer-display">Time: <span id="time">100</span>s</div>
        
        <div class="arena">
            <div id="robot-left" class="robot">🤖</div>
            <div id="rope-container">
                <div id="rope">
                    <div id="knot"></div>
                </div>
            </div>
            <div id="robot-right" class="robot">🤖</div>
        </div>

        <div class="players-grid">
            <div class="player-box" id="p1-area">
                <h2>Player 1</h2>
                <div class="question" id="p1-q">Loading...</div>
                <input type="number" id="p1-input" placeholder="?">
                <div class="score">Progress: <span id="p1-score">0</span>/12</div>
            </div>

            <div class="player-box" id="p2-area">
                <h2>Player 2</h2>
                <div class="question" id="p2-q">Loading...</div>
                <input type="number" id="p2-input" placeholder="?">
                <div class="score">Progress: <span id="p2-score">0</span>/12</div>
            </div>
        </div>
        
        <div id="overlay" class="hidden">
            <div id="result-box">
                <h1 id="winner-text"></h1>
                <button onclick="location.reload()">Play Again</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
